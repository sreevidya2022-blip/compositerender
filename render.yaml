[build]
  command = "pip install -r requirements.txt"
  functions = "netlify/functions"
  publish = "netlify-dist"

[env]
  PYTHON_VERSION = "3.11.9"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
